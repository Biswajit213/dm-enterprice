services:
  # ── Backend ──────────────────────────────────────────
  - type: web
    name: dm-enterprice-api
    runtime: node
    rootDir: DM Enterprice/product page/server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: JWT_COOKIE_EXPIRE
        value: 7
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: FROM_NAME
        value: DM Enterprice
      - key: FROM_EMAIL
        value: noreply@dmenterprize.com

  # ── Frontend ─────────────────────────────────────────
  - type: web
    name: dm-enterprice-client
    runtime: static
    rootDir: DM Enterprice/product page/client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
